{% extends "base.html" %}
{% block title %}Visualizando: {{ filename }}{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header">
        <h3>Visualizando: {{ filename }}</h3>
    </div>
    <div class="card-body">
        <pre class="bg-light p-3 rounded border">{{ content }}</pre>
    </div>
    <div class="card-footer text-end">
        <a href="{{ url_for('baixar', filename=filename) }}" class="btn btn-primary">Baixar Arquivo Original</a>
    </div>
</div>
{% endblock %}
